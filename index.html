<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Pitch Detector</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 320px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 30px;
        }

        #note-display {
            font-size: 6rem;
            font-weight: 800;
            color: #00ffaa;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
            margin: 10px 0;
            transition: all 0.1s ease;
        }

        #frequency-display {
            font-family: monospace;
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        button {
            background: #00ffaa;
            color: #121212;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #00cc88;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        .visualizer {
            margin-top: 30px;
            width: 100%;
            height: 60px;
            background: #121212;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pitch Detector</h1>
        <div id="note-display">--</div>
        <div id="frequency-display">Press Start</div>
        <button id="start-btn">Start Listening</button>
        <canvas id="canvas" class="visualizer"></canvas>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const noteDisplay = document.getElementById('note-display');
        const freqDisplay = document.getElementById('frequency-display');
        const canvas = document.getElementById('canvas');
        const canvasCtx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let buffer;
        let isListening = false;

        startBtn.addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; // Higher resolution for better accuracy
                buffer = new Float32Array(analyser.fftSize);
                
                source.connect(analyser);
                startBtn.style.display = 'none';
                isListening = true;
                update();
            } catch (err) {
                alert("Microphone access denied or not supported.");
            }
        });

        function update() {
            if (!isListening) return;

            analyser.getFloatTimeDomainData(buffer);
            
            // 1. Calculate Pitch
            const pitch = autoCorrelate(buffer, audioContext.sampleRate);

            // 2. Draw Waveform (Visual Juice)
            drawWaveform(buffer);

            if (pitch !== -1) {
                const note = getNote(pitch);
                noteDisplay.innerText = note;
                freqDisplay.innerText = Math.round(pitch) + " Hz";
            } else {
                noteDisplay.style.opacity = "0.3";
            }

            requestAnimationFrame(update);
        }

        // --- THE MATH: Autocorrelation ---
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;

            for (let i = 0; i < SIZE; i++) {
                rms += buf[i] * buf[i];
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // Threshold for silence

            let r1 = 0, r2 = SIZE - 1;
            const threshold = 0.2;
            for (let i = 0; i < SIZE / 2; i++)
                if (Math.abs(buf[i]) < threshold) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++)
                if (Math.abs(buf[SIZE - i]) < threshold) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            let T0 = maxpos;

            return sampleRate / T0;
        }

        function getNote(frequency) {
            const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const n = 12 * (Math.log(frequency / 440) / Math.log(2));
            const noteIndex = Math.round(n) + 69;
            noteDisplay.style.opacity = "1";
            return noteStrings[noteIndex % 12];
        }

        function drawWaveform(data) {
            canvasCtx.fillStyle = "#121212";
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = "#333";
            canvasCtx.beginPath();

            const sliceWidth = canvas.width * 1.0 / data.length;
            let x = 0;

            for (let i = 0; i < data.length; i++) {
                const v = data[i] * 50.0;
                const y = canvas.height / 2 + v;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }
    </script>
</body>
</html>
